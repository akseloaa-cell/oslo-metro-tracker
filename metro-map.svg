<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 400">

  <style>
    .line3 {
      fill: none;
      stroke: #a964a3;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .station {
      fill: white;
      stroke: #a964a3;
      stroke-width: 3;
      cursor: pointer;
      transition: 0.2s;
    }

    .station:hover {
      r: 8;
      fill: #a964a3;
    }

    .label {
      font-family: Arial, sans-serif;
      font-size: 11px;
      fill: #222;
    }
  </style>

  <!-- Linje -->
  <polyline
    class="line3"
    points="
    50,300
    80,300
    110,300
    140,300
    170,300
    200,300
    230,280
    260,260
    290,240
    320,220
    350,200
    380,180
    410,160
    440,140
    470,120
    500,100
    560,100
    620,100
    680,100
    740,100
    800,100
    860,100
    920,100
    980,100
    1020,120
    1040,140
    1060,160
    1080,180
    1100,200
    1120,220
    1140,240
    1160,260
    1180,280
